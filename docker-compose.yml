services:
  postgres:
    container_name: divinemarg-postgres-1
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: divinemarg
      POSTGRES_PASSWORD: divinemarg
      POSTGRES_DB: divinemarg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: divinemarg-redis-1
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
